name: Site checks

on:
  pull_request:
    branches:
      - main
    paths:
      - "client/**"
      - "server/**"
      - "shared/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.ts"
      - "tsconfig.json"
      - ".github/workflows/site-checks.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.4.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Production build
        run: pnpm build

      - name: Upload static preview
        uses: actions/upload-artifact@v4
        with:
          name: site-preview
          path: dist/public
          if-no-files-found: error
          retention-days: 3
