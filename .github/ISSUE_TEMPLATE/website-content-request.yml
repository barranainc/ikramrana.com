name: Website content request
description: Suggest a new article, use case, industry page, landscape commentary, or update.
title: "[Content] "
body:
  - type: dropdown
    id: content_type
    attributes:
      label: What should we create or update?
      options:
        - Critical AI adoption analysis
        - Practical business use case
        - Industry guide
        - AI landscape commentary
        - Update an existing page
    validations:
      required: true

  - type: input
    id: question
    attributes:
      label: What question should this page answer?
      description: Write the question in the words a business owner might use.
      placeholder: How should a business decide whether an AI agent belongs in customer service?
    validations:
      required: true

  - type: textarea
    id: observation
    attributes:
      label: What are you noticing?
      description: Add the trend, problem, conversation, client pattern, or example that prompted this idea.
    validations:
      required: true

  - type: textarea
    id: position
    attributes:
      label: Ikram's critical and practical view
      description: Explain what AI may improve, what it may make worse, what is missing, and where human judgment must remain.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence or source links
      description: Add reports, regulations, product announcements, research, public examples, or first-hand evidence. Leave client names out unless attribution is authorized.
      placeholder: One source per line

  - type: dropdown
    id: claim_status
    attributes:
      label: How should examples and results be treated?
      options:
        - No performance or client claims
        - Illustrative scenario only
        - Public evidence is available
        - Private evidence is available
        - Needs verification before publication
    validations:
      required: true

  - type: input
    id: existing_page
    attributes:
      label: Existing page to update
      description: Optional. Paste the URL if this is an update.

  - type: textarea
    id: notes
    attributes:
      label: Anything else?
      description: Optional audience, industry, location, CTA, or timing notes.
